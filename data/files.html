<div class="card">
  <div class="card-title">LittleFS File Browser</div>
  <div style="margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    <input type="file" id="upload-input" multiple>
    <button class="btn" onclick="uploadFiles()">Upload</button>
    <span id="upload-status" style="font-size:0.85em;opacity:0.7"></span>
  </div>
  <table class="data-table">
    <thead><tr><th align="left">File</th><th align="right">Size</th><th align="right">Actions</th></tr></thead>
    <tbody id="file-list"><tr><td colspan="3">Loading&hellip;</td></tr></tbody>
  </table>
</div>

<div id="edit-modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;background:rgba(0,0,0,0.92);overflow:auto;padding:16px;box-sizing:border-box">
  <div class="card">
    <div class="card-title">Edit &mdash; <span id="edit-path" style="font-weight:normal;font-size:0.9em"></span></div>
    <div id="edit-content" style="border:1px solid #444;font-size:13px"></div>
    <div style="margin-top:8px;display:flex;gap:8px;align-items:center">
      <button class="btn" onclick="saveFile()">Save</button>
      <button class="btn" onclick="closeEditor()">Cancel</button>
      <span id="save-status" style="font-size:0.85em;opacity:0.7"></span>
    </div>
  </div>
</div>
</div></body></html>

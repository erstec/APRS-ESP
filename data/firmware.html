<div class="card" style="max-width:500px">
  <div class="card-title">Device Info</div>
  <p class="info-line">Hardware: <b>{board_name}</b></p>
  <p class="info-line">Firmware: <b>V{version}</b></p>
  <p class="info-line">Chip ID: <b>{chip_id}</b></p>
  <p class="info-line" style="margin-top:8px">Maintained by <b>LY3PH</b></p>
  <p class="info-line"><a href="https://github.com/erstec/APRS-ESP" target="_blank">Project page at GitHub</a></p>
  <p class="info-line"><a href="https://github.com/erstec/APRS-ESP/releases" target="_blank">Download latest firmware</a></p>
</div>

<div class="form-section" style="max-width:500px">
  <h3>Flash Update</h3>
  <p class="info-line" style="font-size:12px;color:var(--text-muted)">Firmware: <b>*-update.bin</b> &nbsp;|&nbsp; Filesystem: <b>littlefs-*.bin</b></p>
  <form method="POST" action="#" enctype="multipart/form-data" id="upload_form">
    <div class="form-row"><label>Firmware or Filesystem file</label><input type="file" name="update" onchange="sub(this)"></div>
    <div class="btn-row">
      <input type="submit" class="btn btn-danger" id="update_submit" value="Flash">
    </div>
    <div id="prg"></div>
    <div id="prgbar"><div id="bar" style="width:0%"></div></div>
  </form>
</div>

<script src="/firmware.js"></script>
</div></body></html>

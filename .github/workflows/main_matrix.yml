name: CI
on:
  # # Triggers the workflow on push for all branches
  push:
    # branches: [master, ci-changes]
    branches:
      - "**"
    paths-ignore:
      - "**.md"
      - "version.properties"
    tags:
      - v*

  workflow_dispatch:

jobs:
  build-esp32:
    strategy:
      fail-fast: false
      matrix:
        include:
          - board: esp32dev-sa818-868
    uses: ./.github/workflows/build_esp32.yml
    with:
      board: ${{ matrix.board }}

  build-esp32-s3:
    strategy:
      fail-fast: false
      matrix:
        include:
          - board: lilygo-t-twr-plus
          - board: lilygo-t-twr-v1
    uses: ./.github/workflows/build_esp32_s3.yml
    with:
      board: ${{ matrix.board }}

  build-native:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Native
        run: bin/build-native.sh

      - name: Get release version string
        run: echo "version=$(./bin/buildinfo.py long)" >> $GITHUB_OUTPUT
        id: version

      - name: Store binaries as an artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-native-${{ steps.version.outputs.version }}.zip
          path: |
            release/device-*.sh
            release/device-*.bat
  
  gather-artifacts:
    runs-on: ubuntu-latest
    needs:
      [build-esp32, build-esp32-s3, build-native]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: ./

      - name: Get release version string
        run: echo "version=$(./bin/buildinfo.py long)" >> $GITHUB_OUTPUT
        id: version

      - name: Move files up
        run: mv -b -t ./ ./**/firmware*.bin ./**/littlefs*.bin ./*native*/*device-*.sh ./*native*/*device-*.bat

      - name: Repackage in single firmware zip
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ steps.version.outputs.version }}
          path: |
            ./firmware*.bin
            ./littlefs*.bin
            ./device-*.sh
            ./device-*.bat
          retention-days: 5

      - uses: actions/download-artifact@v4
        with:
          name: firmware-${{ steps.version.outputs.version }}
          path: ./output

      # For diagnostics
      - name: Show artifacts
        run: ls -lR

      - name: Device scripts permissions
        run: |
          chmod +x ./output/device-install.sh
          chmod +x ./output/device-update.sh

      - name: Zip firmware
        run: zip -j -9 -r ./firmware-${{ steps.version.outputs.version }}.zip ./output

  release-artifacts:
    runs-on: ubuntu-latest
    if: startsWith(github.event.ref, 'refs/tags/v')
    needs: [gather-artifacts]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.x

      - name: Get release version string
        run: echo "version=$(./bin/buildinfo.py long)" >> $GITHUB_OUTPUT
        id: version
      
      - name: Get short release version string
        run: echo "short_version=$(./bin/buildinfo.py short)" >> $GITHUB_OUTPUT
        id: short_version

      - uses: actions/download-artifact@v4
        with:
          name: firmware-${{ steps.version.outputs.version }}
          path: ./output

      - name: Device scripts permissions
        run: |
          chmod +x ./output/device-install.sh
          chmod +x ./output/device-update.sh

      - name: Zip firmware
        run: zip -j -9 -r ./firmware-${{ steps.version.outputs.version }}.zip ./output

      # For diagnostics
      - name: Show artifacts
        run: ls -lR

      - name: Generate changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          RANGE="${PREV_TAG:+$PREV_TAG..HEAD}"
          RANGE="${RANGE:-HEAD}"

          FEATURES=$(git log --reverse --format="- %s" $RANGE \
            | grep -E "^- feat:" | sed 's/^- feat: /- /' \
            | grep -vE "(changelog|release template|release process|CI)")

          BODY=$(git log --reverse $RANGE --format="COMMIT_START %s%n%b%nCOMMIT_END" \
            | awk '
              /^COMMIT_START feat:/ { in_feat=1; next }
              /^COMMIT_START/       { in_feat=0; next }
              /^COMMIT_END/         { next }
              in_feat && /^(Merge |Bump |Update |Signed-off|Co-authored)/ { in_feat=0; next }
              in_feat && /[A-Za-z]/ { print }
            ')

          {
            if [ -n "$FEATURES" ]; then
              echo "**New Features:**"
              echo "$FEATURES"
              echo ""
            fi
            if [ -n "$BODY" ]; then
              echo "**Details:**"
              echo "$BODY" | sed 's/^/- /'
              echo ""
            fi
          } > changelog.md

      - name: Create release
        run: |
          gh release create v${{ steps.version.outputs.version }} \
            --title "APRS-ESP Firmware ${{ steps.short_version.outputs.short_version }}" \
            --notes-file changelog.md \
            --draft \
            --prerelease \
            ./firmware-${{ steps.version.outputs.version }}.zip#aprsesp-firmware-${{ steps.version.outputs.version }}.zip
        env:
          GH_TOKEN: ${{ github.token }}

      # - name: Bump version.properties
      #   run: >-
      #     bin/bump_version.py

      # - name: Create version.properties pull request
      #   uses: peter-evans/create-pull-request@v3
      #   with:
      #     add-paths: |
      #       version.properties
